<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Painel Admin | Favela Imports PE</title><link rel="stylesheet" href="assets/css/style.css"><style>body{padding:24px}.admin{max-width:1200px;margin:auto}.row{background:#080808;border:1px solid #7b560a;border-radius:16px;padding:16px;margin:12px 0}.admin table{width:100%;border-collapse:collapse}.admin th,.admin td{border-bottom:1px solid #332405;padding:10px;text-align:left}.admin input,.admin select{width:100%;background:#000;border:1px solid #6e4d0c;color:#ffe79a;border-radius:8px;padding:10px}.admin button{padding:10px 14px;border:1px solid #d6a528;background:#d6a528;color:#000;border-radius:8px;font-weight:900;cursor:pointer}.mini{width:70px;height:70px;object-fit:contain;background:#000;border:1px solid #3b2904;border-radius:8px}</style></head><body><main class="admin"><h1>Painel Admin</h1><p>Login padrão: <b>admin</b> / senha <b>123456</b>. Altere no arquivo <b>.env</b>.</p><section class="row"><h2>Novo produto</h2><div class="grid"><input id="pname" placeholder="Nome"><input id="pprice" placeholder="Preço"><select id="pcat"><option value="times">Times</option><option value="camisas">Camisas</option><option value="tenis">Tênis</option><option value="chinelos">Chinelos</option><option value="acessorios">Acessórios</option></select><input id="pstock" placeholder="Estoque"><input id="pimg" placeholder="Caminho da imagem. Ex: assets/img/products/foto.png"><button onclick="createProduct()">Cadastrar</button></div></section><section class="row"><h2>Pedidos</h2><div id="orders">Carregando...</div></section><section class="row"><h2>Produtos / Estoque</h2><div id="products">Carregando...</div></section></main><script>
let auth='Basic '+btoa(prompt('Usuário admin','admin')+':'+prompt('Senha','123456'));
const money=v=>Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
async function api(url,opt={}){opt.headers={...(opt.headers||{}),Authorization:auth,'Content-Type':'application/json'};let r=await fetch(url,opt);if(r.status===401){alert('Login inválido');throw new Error('auth')}return r.json()}
async function loadOrders(){let data=await api('/api/admin/orders');orders.innerHTML='<table><tr><th>Código</th><th>Cliente</th><th>Total</th><th>Status</th><th>Ações</th></tr>'+data.map(o=>`<tr><td>${o.id}</td><td>${o.customer_name}<br>${o.phone}</td><td>R$ ${money(o.subtotal)}</td><td><select id="s${o.id}"><option ${o.status=='novo'?'selected':''}>novo</option><option ${o.status=='em separação'?'selected':''}>em separação</option><option ${o.status=='enviado'?'selected':''}>enviado</option><option ${o.status=='concluído'?'selected':''}>concluído</option><option ${o.status=='cancelado'?'selected':''}>cancelado</option></select></td><td><button onclick="saveStatus('${o.id}')">Salvar</button></td></tr>`).join('')+'</table>'}
async function saveStatus(id){await api('/api/admin/orders/'+id,{method:'PATCH',body:JSON.stringify({status:document.getElementById('s'+id).value})});loadOrders()}
async function loadProducts(){let data=await api('/api/admin/products');products.innerHTML='<table><tr><th>Foto</th><th>Nome</th><th>Preço</th><th>Categoria</th><th>Estoque</th><th>Ativo</th><th></th></tr>'+data.map(p=>`<tr><td><img class="mini" src="${p.image}"></td><td><input id="n${p.id}" value="${p.name}"></td><td><input id="pr${p.id}" value="${p.price}"></td><td><input id="c${p.id}" value="${p.category}"></td><td><input id="st${p.id}" value="${p.stock}"></td><td><input id="a${p.id}" type="checkbox" ${p.active?'checked':''}></td><td><button onclick="saveProduct('${p.id}','${p.image.replace(/'/g,'')}')">Salvar</button></td></tr>`).join('')+'</table>'}
async function saveProduct(id,img){await api('/api/admin/products/'+id,{method:'PATCH',body:JSON.stringify({name:document.getElementById('n'+id).value,price:document.getElementById('pr'+id).value,category:document.getElementById('c'+id).value,stock:document.getElementById('st'+id).value,active:document.getElementById('a'+id).checked,image:img})});loadProducts()}
async function createProduct(){await api('/api/admin/products',{method:'POST',body:JSON.stringify({name:pname.value,price:pprice.value,category:pcat.value,stock:pstock.value,image:pimg.value,active:1})});pname.value=pprice.value=pstock.value=pimg.value='';loadProducts()}
loadOrders();loadProducts();
</script></body></html>
